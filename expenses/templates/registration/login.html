{% extends "base.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-5">

        <div class="card shadow-sm">

            <div class="card-body p-5">

                <div class="mb-4 text-center">

                    <h2 class="fw-bold mb-2">
                        Sign In
                    </h2>

                    <p class="text-muted mb-0">
                        Access your expense dashboard.
                    </p>

                </div>

                {% if form.errors %}

                <div class="alert alert-danger">

                    Invalid username or password.

                </div>

                {% endif %}

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-dark">

                            Sign In

                        </button>

                    </div>

                </form>

                <hr class="my-4">

                <p class="text-center mb-0">

                    Don't have an account?

                    <a href="{% url 'register' %}">
                        Create Account
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
